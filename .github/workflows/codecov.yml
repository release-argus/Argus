name: Codecov

on:
  push:
    branches:
      - master
    tags:
      - v*
  pull_request:
    types: [opened, reopened, synchronize]

concurrency:
  group: codecov-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Use Node.js LTS
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: 24

      - name: Build web components
        run: make web

      - name: Set up Go 1.x
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version-file: go.mod
          check-latest: true
          cache: true

      - name: Test
        run: go test -v ./... -timeout 5m -coverpkg=./... -coverprofile ./coverage.out -covermode atomic --tags unit,integration
        env:
          DOCKER_HUB_USERNAME: ${{ vars.DOCKER_HUB_USERNAME_R }}
          DOCKER_HUB_TOKEN: ${{ secrets.DOCKER_HUB_TOKEN_R }}
          GITHUB_TOKEN: ${{ secrets.DOCKER_GHCR_TOKEN_R }}
          DOCKER_QUAY_TOKEN: ${{ secrets.DOCKER_QUAY_TOKEN_R }}
          GOEXPERIMENT: jsonv2

      - name: Publish coverage
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
        with:
          verbose: true
