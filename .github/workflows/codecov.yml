name: Codecov

on:
  push:
    branches:
      - master
    tags:
      - v*
  pull_request:
    types: [opened, reopened, synchronize]

env:
  GOEXPERIMENT: jsonv2

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6

      - name: Use Node.js LTS
        uses: actions/setup-node@395ad3262231945c25e8478fd5baf05154b1d79f # v6
        with:
          node-version: 24

      - name: Build web components
        run: make web

      - name: Set up Go 1.x
        uses: actions/setup-go@4dc6199c7b1a012772edbd06daecab0f50c9053c # v6
        with:
          go-version-file: go.mod
          check-latest: true
          cache: true

      - name: Test
        run: go test -v ./... -timeout 5m -coverpkg=./... -coverprofile ./coverage.out -covermode atomic --tags unit,integration
        env:
          DOCKER_HUB_USERNAME: ${{ vars.DOCKER_HUB_USERNAME_R }}
          DOCKER_HUB_TOKEN: ${{ secrets.DOCKER_HUB_TOKEN_R }}
          GITHUB_TOKEN: ${{ secrets.DOCKER_GHCR_TOKEN_R }}
          DOCKER_QUAY_TOKEN: ${{ secrets.DOCKER_QUAY_TOKEN_R }}

      - name: Publish coverage
        uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2 # v6
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
        with:
          verbose: true
