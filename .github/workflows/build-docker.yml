name: Docker Build

on:
  push:
    branches:
      - master
  release:
    types:
      - published

jobs:
  build-docker:
    name: Docker Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Set outputs
        id: vars
        run: |
          echo "sha_short=$(git rev-parse --short HEAD)"  >> ${GITHUB_ENV}
          echo "repository=${repository,,}" >> ${GITHUB_ENV}
          echo "repository_owner=${repository_owner,,}" >> ${GITHUB_ENV}
          echo "GO_VERSION=$(cat go.mod | grep -Po 'go \K([0-9.]+)')" >> ${GITHUB_ENV}
        env:
          repository: '${{ github.repository }}'
          repository_owner: '${{ github.repository_owner }}'

      - name: Set up QEMU
        uses: docker/setup-qemu-action@96fe6ef7f33517b61c61be40b68a1882f3264fb8 # v4

      - name: Set up Docker Buildx
        id: buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4

      - name: Login to Docker Hub
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4
        with:
          username: ${{ vars.DOCKER_HUB_USERNAME_RW }}
          password: ${{ secrets.DOCKER_HUB_TOKEN_RW }}

      - name: Login to GitHub Container Registry
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4
        with:
          registry: ghcr.io
          username: ${{ env.repository_owner }}
          password: ${{ secrets.DOCKER_GHCR_TOKEN_RW }}

      - name: Login to Quay.io
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4
        with:
          registry: quay.io
          username: ${{ vars.DOCKER_QUAY_USERNAME_RW }}
          password: ${{ secrets.DOCKER_QUAY_TOKEN_RW }}

      - name: Build and push (release)
        id: docker_build_release
        if: github.event_name == 'release'
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7
        with:
          context: .
          file: Dockerfile
          push: true
          tags: |
            releaseargus/argus:${{ github.event.release.tag_name }}
            releaseargus/argus:latest
            releaseargus/argus:master
            ghcr.io/${{ env.repository }}:${{ github.event.release.tag_name }}
            ghcr.io/${{ env.repository }}:latest
            ghcr.io/${{ env.repository }}:master
            quay.io/argus-io/argus:${{ github.event.release.tag_name }}
            quay.io/argus-io/argus:latest
            quay.io/argus-io/argus:master
          cache-from: type=local,src=/tmp/.buildx-cache
          cache-to: type=local,dest=/tmp/.buildx-cache
          platforms: linux/amd64,linux/arm64
          provenance: false
          build-args: |
            BUILD_VERSION=${{ github.event.release.tag_name }}

      - name: Build and push (master)
        id: docker_build_master
        if: github.event_name != 'release'
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7
        with:
          context: .
          file: Dockerfile
          push: true
          tags: |
            releaseargus/argus:master
            ghcr.io/${{ env.repository }}:master
            quay.io/argus-io/argus:master
          cache-from: type=local,src=/tmp/.buildx-cache
          cache-to: type=local,dest=/tmp/.buildx-cache
          platforms: linux/amd64,linux/arm64
          provenance: false
          build-args: |
            BUILD_VERSION=${{ env.sha_short }}
